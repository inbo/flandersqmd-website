title: Corporate identity of the Flemish government quarto website
author: Thierry Onkelinx
version: 0.1.0
quarto-required: ">=1.4.0"
contributes:
  project:
    project:
      type: website
      lib-dir: libs
  format:
    html:
      knitr:
        opts_chunk:
          echo: false
      lang: nl-BE
      csl: research-institute-for-nature-and-forest.csl
      number-sections: false
      toc: true
      anchor-sections: true
      html-math-method: katex
      shortcodes:
        - shortcodes/authors.lua
        - shortcodes/client.lua
        - shortcodes/colophon.lua
        - shortcodes/footer.lua
        - shortcodes/inbo_info.lua
        - shortcodes/minimal.lua
        - shortcodes/reference.lua
      css: [css/flanders_generic.css]
      template-partials:
        - "partials/metadata.html"
        - "partials/title-block.html"
      filters:
        - filters/translations.lua
